services:
  db:
    image: postgres:16-alpine
    container_name: hms-db
    environment:
      POSTGRES_DB: hms
      POSTGRES_USER: hms
      POSTGRES_PASSWORD: hms
    ports:
      - "5432:5432"
    volumes:
      - hms-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hms -d hms"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  hms-db-data:
